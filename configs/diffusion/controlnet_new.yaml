controlnet:
  condition_keys: ["aorta", "atrium_l", "atrium_r", "myocardium", "ventricle_l", "ventricle_r"]
  params:
    spatial_dims: 3
    in_channels: 8                  # input channels for latents
    num_res_blocks: 2
    num_channels: [64,128,256,512] 
    attention_levels: [False, False, True, True]
    with_conditioning: True
    num_head_channels: [0, 0, 32, 32]
    r: 0.5 # scaling factor that scales U-Net channels and creates a lightweight adapter version: control_channels = r * U-net_channels
    conditioning_embedding_in_channels: 6  # number of mask channels
    conditioning_embedding_num_channels: [32,64] # adjust depending on initial stride
    initial_stride: 2  # 1 if you want finer initial projection, 2 if downsample immediately (more memory efficient, good for global masks)
    use_flash_attention: True
    
pretrained_model:
  params:
    spatial_dims: 3
    in_channels: 8
    out_channels: 8
    num_res_blocks: 2
    num_channels: [64, 128, 256, 512]
    attention_levels: [false, false, true, true]
    with_conditioning: false
    num_head_channels: [0, 0, 32, 32]
    use_flash_attention: true
ldm:
  scheduler:
    schedule: "cosine"
    num_train_timesteps: 300
    prediction_type: "v_prediction"

training:
  n_epochs: 500
  batch_size: 1
  num_workers: 4
  roi_size: [512, 512, 256] #only used if use_precomputed_latents is False
  use_precomputed_latents: True
  preload_latents: True
  use_ema: True
  ema_decay: 0.999
  scale_factor: 1.0        # scales latent before adding noise (matches VQVAE). needs to be defined via 1/std(latent)
  eval_freq: 5
  control_dropout: 0.1          # probability of dropping entire control channel
  spatial_dropout_prob: 0.0     # patch-wise dropout probability
  spatial_dropout_patch_size: 16
  lr: 7.5e-5
  lr_gamma: 0.999
  cache: False # Decides if latents and masks are preloaded into memory. Not recommended if dataset or resolution is large
  persistent: False # If images are not preencoded, persistendataset can precompute transforms and save them to drive, enabling fast loading during training
