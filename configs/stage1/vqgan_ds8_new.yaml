training:
  n_epochs: 1300
  batch_size: 1
  num_workers: 4
  eval_freq: 10
  roi_size: [256,256,128]
  use_persistent: true
optim:
  lr_g: 3e-5 #3e-5
  lr_d: 2e-5 #1e-4

losses:
  perceptual_weight: 0.1
  adv_weight: 0.008
  jukebox_weight: 0.7
  adv_warmup: 10
  perceptual_params:
    spatial_dims: 3
    network_type: "squeeze"
  jukebox_params:
    spatial_dims: 3

model:
  params:
    spatial_dims: 3
    in_channels: 1
    out_channels: 1
    num_channels: [128, 256, 512]
    num_res_channels: [128, 256, 512]
    num_res_layers: 2
    downsample_parameters:
      [[2, 4, 1, 1],
       [2, 4, 1, 1],
       [2, 4, 1, 1]]

    upsample_parameters:
      [[2, 4, 1, 1, 0],
       [2, 4, 1, 1, 0],
       [2, 4, 1, 1, 0]]

    num_embeddings: 16384
    embedding_dim: 8
    commitment_cost: 0.25 #0.25
    decay: 0.98 #0.95
    epsilon: 1e-5

    dropout: 0.0
    act: "RELU"

discriminator:
  params:
    spatial_dims: 3
    num_channels: 64
    num_layers_d: 3
    in_channels: 1
    out_channels: 1
    norm: "INSTANCE"
