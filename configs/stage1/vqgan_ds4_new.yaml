training:
  n_epochs: 500
  batch_size: 2
  num_workers: 1
  eval_freq: 50
  roi_size: [128,128,128]  

optim:
  lr_g: 3e-5  
  lr_d: 1e-4 

losses:
  perceptual_weight: 0.002
  adv_weight: 0.005
  jukebox_weight: 1.0    
  adv_warmup: 10
  perceptual_params:
    spatial_dims: 3
    network_type: "squeeze"
  jukebox_params:
    spatial_dims: 3
model:
  params:
    spatial_dims: 3
    in_channels: 1
    out_channels: 1
    num_channels: [128, 256]
    num_res_channels: [128, 256]
    num_res_layers: 2
    # stride first, kernel second
    downsample_parameters: [[2, 4, 1, 1], [2, 4, 1, 1]]
    upsample_parameters: [[2, 4, 1, 1, 0], [2, 4, 1, 1, 0]]
    num_embeddings: 16384
    embedding_dim: 8
    commitment_cost: 0.25
    decay: 0.95
    epsilon: 1e-5
    dropout: 0.0
    act: "RELU"


discriminator:
  params:
    spatial_dims: 3
    num_channels: 64
    num_layers_d: 3
    in_channels: 1
    out_channels: 1
    norm: "INSTANCE"
