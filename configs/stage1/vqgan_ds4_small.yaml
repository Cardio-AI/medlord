training:
  n_epochs: 500
  batch_size: 1
  num_workers: 4
  eval_freq: 5  
  roi_size: [256, 256, 256]
	
optim:
  lr_g: 3e-5  
  lr_d: 1e-4 

losses:
  perceptual_weight: 0.002
  adv_weight: 0.005
  jukebox_weight: 1.0    
  adv_warmup: 10  
  perceptual_params:
    spatial_dims: 3
    network_type: "squeeze"
  jukebox_params:
    spatial_dims: 3

model:
  params:
    spatial_dims: 3
    in_channels: 1
    out_channels: 1
    num_channels: [64, 128]  # reduced from 128,256
    num_res_channels: [64, 128]  
    num_res_layers: 2
    downsample_parameters: [[2, 4, 1, 1], [2, 4, 1, 1]] 
    upsample_parameters: [[2, 4, 1, 1, 0], [2, 4, 1, 1, 0]]
    num_embeddings: 8192  # reduced from 16k
    embedding_dim: 8
    commitment_cost: 0.25
    decay: 0.99
    epsilon: 1e-5
    dropout: 0.0
    act: "RELU"

discriminator:
  params:
    spatial_dims: 3
    num_channels: 32  # reduced from 64
    num_layers_d: 3
    in_channels: 1
    out_channels: 1
    norm: "INSTANCE"
